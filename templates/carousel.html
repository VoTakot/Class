{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col text-center">
            <h1>Пейзажи Марса</h1>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <div id="carouselExample" class="carousel slide">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{{ url_for('static', filename='images/mars1.jpg') }}" class="d-block w-100"
                             alt="Пейзаж Марса 1">
                    </div>
                    <div class="carousel-item">
                        <img src="{{ url_for('static', filename='images/mars2.jpg') }}" class="d-block w-100"
                             alt="Пейзаж Марса 2">
                    </div>
                    <div class="carousel-item">
                        <img src="{{ url_for('static', filename='images/mars3.jpeg') }}" class="d-block w-100"
                             alt="Пейзаж Марса 3">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}
