{% extends 'base.html' %}

{% block content %}
<h1>Мое предложение: {{ planet_name }}</h1>
<h2>Эта планета близка к земле;</h2>

<div class="alert alert-success" style="padding-left: 1px; padding-bottom: 1px; margin-bottom: 4px;">
    <p style="margin-bottom: 1px;">
        На ней много необходимых ресурсов;
    </p>
</div>
<div class="alert alert-secondary" style="padding-left: 1px; padding-bottom: 1px; margin-bottom: 4px;">
    <p style="margin-bottom: 1px;">
        На ней есть вода и атмосфера;
    </p>
</div>
<div class="alert alert-warning" style="padding-left: 1px; padding-bottom: 1px; margin-bottom: 4px;">
    <p style="margin-bottom: 1px;">
        На ней есть большое магнитное поле;
    </p>
</div>
<div class="alert alert-danger" style="padding-left: 1px; padding-bottom: 1px; margin-bottom: 4px;">
    <p style="margin-bottom: 1px;">
        Наконец, она просто красива!
    </p>
</div>

{% endblock %}


<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
